name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: src/backend
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/matabayan_test
      JWT_SECRET: ci-test-secret
      PORT: 5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Verify server starts
        run: timeout 10 node server.js || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Build frontend
        run: npm run build
        env:
          CI: false

  automation:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/matabayan_test
      JWT_SECRET: ci-test-secret
      PORT: 5000
      HEADLESS: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Node dependencies
        run: npm run install:all
      - name: Install Python dependencies
        run: pip install pytest selenium webdriver-manager
      - name: Build frontend
        working-directory: src/frontend
        run: npm run build
        env:
          CI: false
      - name: Start backend
        working-directory: src/backend
        run: node server.js > /tmp/backend.log 2>&1 &
      - name: Verify backend started
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            echo "Attempt $i: backend not ready, waiting 2s..."
            sleep 2
          done
          echo "=== BACKEND LOG ==="
          cat /tmp/backend.log
          exit 1
      - name: Start frontend
        run: node_modules/.bin/serve -s src/frontend/build -l 3000 > /tmp/frontend.log 2>&1 &
      - name: Verify frontend started
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Attempt $i: frontend not ready, waiting 2s..."
            sleep 2
          done
          echo "=== FRONTEND LOG ==="
          cat /tmp/frontend.log
          exit 1
      - name: Run automation tests
        working-directory: tests/automation
        run: pytest -v
      - name: Show server logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOG ==="
          cat /tmp/backend.log || true
          echo "=== FRONTEND LOG ==="
          cat /tmp/frontend.log || true
