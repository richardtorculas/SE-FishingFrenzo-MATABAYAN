name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: src/backend
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/matabayan_test
      JWT_SECRET: ci-test-secret
      PORT: 5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Verify server starts
        run: timeout 10 node server.js || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - name: Build frontend
        run: npm run build
        env:
          CI: false

  automation:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/matabayan_test
      JWT_SECRET: ci-test-secret
      PORT: 5000
      HEADLESS: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Node dependencies
        run: npm run install:all
      - name: Install Python dependencies
        run: pip install pytest selenium webdriver-manager
      - name: Start backend
        working-directory: src/backend
        run: node server.js &
      - name: Start frontend
        working-directory: src/frontend
        run: npx serve -s build -l 3000 &
      - name: Wait for servers
        run: npx wait-on http://localhost:3000 http://localhost:5000/health --timeout 60000
      - name: Run automation tests
        working-directory: tests/automation
        run: pytest -v
